components:
  schemas:
    AuthConfig:
      required:
      - password
      - username
      type: object
      properties:
        username:
          type: string
          description: Username
        password:
          type: string
          description: Password
      description: Auth config of the connection to the source cluster.
    CdcReplicationStatus:
      type: string
      description: CDC replication status. {@see org.gridgain.internal.cdc.api.replication.CdcReplicationStatus}
      enum:
      - CREATED
      - RUNNING
      - STOPPED
      - FAILED
    CheckResult:
      type: object
      properties:
        name:
          type: string
          description: Violation name
        errorDetails:
          type: string
          description: Error details
          nullable: true
      description: Cdc sink/source check result
    ClusterNode:
      type: object
      properties:
        id:
          type: string
          description: Node ID.
          format: uuid
        name:
          type: string
          description: Unique cluster name.
        address:
          allOf:
