          format: uri
        pathType:
          allOf:
          - $ref: '#/components/schemas/PathType'
          - description: The path type used in the snapshot operation (LOCAL or REMOTE).
        force:
          type: boolean
          description: If force flag was used.
      description: Snapshot operation info.
    SnapshotOperationType:
      type: string
      description: Type of the operation.
      enum:
      - CREATE
      - RESTORE
      - DELETE
    SnapshotStatus:
      type: string
      description: Status of the operation.
      enum:
      - PREPARED
      - STARTED
      - COMPLETED
      - DELETED
      - FAILED
    SnapshotType:
      type: string
      description: Type of the snapshot, FULL or INCREMENTAL.
      enum:
      - NOT_SPECIFIED
      - FULL
      - INCREMENTAL
    Source:
      type: object
      properties:
        type:
          allOf:
          - $ref: '#/components/schemas/SourceType'
          - description: Type
        name:
          type: string
          description: Name
        parameters:
          type: object
          additionalProperties: true
          description: Parameters
        tables:
          type: array
          description: Tables
          items:
            $ref: '#/components/schemas/SourceTable'
      description: Source
    SourceStatus:
      type: object
      properties:
        source:
          allOf:
          - $ref: '#/components/schemas/Source'
          - description: Source
        violations:
          type: array
          description: Checks
          items:
            $ref: '#/components/schemas/CheckResult'
      description: Source status
    SourceTable:
      type: object
      properties:
        schema:
          type: string
          description: Table schema
        name:
          type: string
          description: Table name
      description: Source Table
    SourceType:
      type: string
      description: Type
      enum:
      - GRIDGAIN
    SqlQuery:
      required:
      - id
      - node
      - phase
      - schema
      - sql
      - startTime
      - type
      type: object
      properties:
        id:
          type: string
          description: Sql query ID.
          format: uuid
        node:
          type: string
          description: Initiator node.
        phase:
          type: string
          description: Phase.
        type:
          type: string
          description: Type.
        schema:
          type: string
          description: Schema.
        sql:
          type: string
          description: SQL statement.
        startTime:
          type: string
          description: Start time.
          format: date-time
      description: Rest representation of sql query.
    SslConfig:
      type: object
      properties:
        ciphers:
          type: array
          description: ciphers
          nullable: true
          items:
            type: string
        keyStorePath:
          type: string
          description: Key store path that will be used to setup SSL connection.
          nullable: true
        keyStorePassword:
          type: string
          description: Key store password.
          nullable: true
        trustStorePath:
          type: string
          description: Trust store path that will be used to setup SSL connection..
          nullable: true
        trustStorePassword:
          type: string
          description: Trust store password.
          nullable: true
      description: SSL config of the connection to the source cluster.
    StartStopReplicationRequest:
      type: object
      properties:
        schemaName:
          type: string
          description: 'Schema name for replication. If null: for allTables=true, no schema filtering is applied (replicates
            all schemas); for explicit table lists, unqualified table names default to PUBLIC schema. If specified, acts as
            default schema for unqualified table names or as schema filter for allTables=true.'
          nullable: true
        allTables:
          type: boolean
          description: If true, all tables will be replicated.
          nullable: true
        tables:
          type: array
          description: List of table names to be replicated.
          nullable: true
          items:
            type: string
      description: DTO for creating a cluster replication request.
    State:
      type: string
      description: Possible node states.
      enum:
      - STARTING
      - STARTED
      - STOPPING
    TableRecoveryStatus:
      type: string
      description: Tables recovery status response.
      enum:
      - PREPARED
      - STARTED
      - COMPLETED
      - FAILED
    TableStatus:
      required:
      - status
      - table
      type: object
      properties:
        status:
          allOf:
          - $ref: '#/components/schemas/ReplicationStatus'
          - description: Current status of the table replication.
        table:
          type: string
          description: Table name
      description: Contains detailed information about a specific table replication process.
    TablesRecoveryRequest:
      required:
      - tables
      - timestamp
      type: object
      properties:
        tables:
          type: array
          description: List of fully-qualified names of the tables to recover. Without quotes, case-sensitive.
          items:
            type: string
        timestamp:
          type: string
          description: Point-in-Time recovery timestamp.
          format: date-time
      description: Tables recovery request.
    TablesRecoveryResponse:
      required:
      - operationId
      type: object
      properties:
        operationId:
          type: string
          description: Id of Point-in-Time recovery process to recover tables.
          format: uuid
      description: Tables recovery response.
    TablesRecoveryStateResponse:
      required:
      - recoveryProgress
      - recoveryStatus
      type: object
      properties:
        recoveryProgress:
          type: object
          additionalProperties:
            type: integer
            format: int64
          description: Progress of the recovery process to recover tables, for each table.
        recoveryStatus:
          allOf:
          - $ref: '#/components/schemas/TableRecoveryStatus'
          - description: Status of the recovery.
      description: Tables recovery state response.
    Transaction:
      required:
      - id
      - node
      - priority
      - startTime
      - state
      - type
      type: object
      properties:
        id:
          type: string
          description: Transaction ID.
          format: uuid
        node:
          type: string
          description: Coordinator node.
        state:
          type: string
          description: State.
        type:
          type: string
          description: Type.
        priority:
          type: string
          description: Priority.
        startTime:
          type: string
          description: Start time.
          format: date-time
      description: Rest representation of transaction.
    UnitEntry:
      type: object
      description: Unit content entry.
      discriminator:
        propertyName: type
      oneOf:
      - $ref: '#/components/schemas/UnitFile'
      - $ref: '#/components/schemas/UnitFolder'
    UnitFile:
      required:
      - name
      - size
      - type
      type: object
      properties:
        type:
          type: string
          description: Entry type discriminator.
          enum:
          - file
        name:
          type: string
          description: Unit content file name.
        size:
          type: integer
          description: Unit content file size in bytes.
          format: int64
      description: Unit content file.
    UnitFolder:
      required:
      - children
      - name
      - size
      - type
      type: object
      properties:
        type:
          type: string
          description: Entry type discriminator.
          enum:
          - folder
        name:
          type: string
          description: Unit content folder name.
        children:
          type: array
          description: Unit content folder elements.
          items:
            $ref: '#/components/schemas/UnitEntry'
        size:
          type: integer
          description: Total size of folder contents in bytes (computed as sum of all children).
          format: int64
          readOnly: true
      description: Unit content folder.
    UnitStatus:
      required:
      - id
      - versionToStatus
      type: object
      properties:
        id:
          type: string
          description: Unit identifier.
        versionToStatus:
          type: array
          description: Map from unit version to unit deployment status.
          items:
            $ref: '#/components/schemas/UnitVersionStatus'
      description: Unit status.
    UnitVersionStatus:
      required:
      - status
      - version
      type: object
      properties:
        version:
          type: string
          description: Unit version.
        status:
          allOf:
          - $ref: '#/components/schemas/DeploymentStatus'
          - description: Unit status.
      description: Unit version and status.
    UpdateJobPriorityBody:
      required:
      - priority
      type: object
      properties:
        priority:
          type: integer
          description: Priority.
          format: int32
      description: DTO of update job priority request body.
    UpgradeStateResponse:
      required:
      - currentVersion
      - currentVersionNodes
      - nextVersion
      - nextVersionNodes
      type: object
      properties:
        currentVersion:
          type: string
          description: Current cluster version.
        nextVersion:
          type: string
          description: Next cluster version.
        currentVersionNodes:
          type: array
          description: Current cluster version nodes.
          items:
            type: string
        nextVersionNodes:
          type: array
          description: Next cluster version nodes.
          items:
            type: string
      description: Cluster Upgrade State.
    User:
      type: object
      properties:
        username:
          type: string
          description: Username
      description: User
    UserRoles:
      type: object
      properties:
        username:
          type: string
          description: Username
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
      description: UserRoles
    deployMode:
      type: string
      description: Initial set of nodes to deploy.
      enum:
      - MAJORITY
      - ALL
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    bearerToken:
      type: http
      scheme: bearer
