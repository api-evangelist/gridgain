components:
  schemas:
    SourceTable:
      type: object
      properties:
        schema:
          type: string
          description: Table schema
        name:
          type: string
          description: Table name
      description: Source Table
    InvalidParam:
      type: object
      properties:
        name:
          type: string
          description: Parameter name.
        reason:
          type: string
          description: The issue with the parameter.
      description: Information about invalid request parameter.
    CdcReplicationStatus:
      type: string
      description: CDC replication status. {@see org.gridgain.internal.cdc.api.replication.CdcReplicationStatus}
      enum:
      - CREATED
      - RUNNING
      - STOPPED
      - FAILED
    ReplicationMode:
      type: string
      description: 'CDC replication mode.


        `ALL` - replicates all data from the source to the sink.


        `NEW_DATA` - replicates only new data that appears in the source after the replication is started.

        {@see org.gridgain.internal.cdc.api.replication.CdcReplicationMode}.'
      enum:
      - ALL
      - NEW_DATA
    Source:
      type: object
      properties:
        type:
          allOf:
          - $ref: '#/components/schemas/SourceType'
          - description: Type
        name:
          type: string
          description: Name
        parameters:
          type: object
          additionalProperties: true
          description: Parameters
        tables:
          type: array
          description: Tables
          items:
            $ref: '#/components/schemas/SourceTable'
      description: Source
    SinkStatus:
      type: object
      properties:
        sink:
          allOf:
          - $ref: '#/components/schemas/Sink'
          - description: Sink
        checks:
          type: array
          description: Checks
          items:
            $ref: '#/components/schemas/CheckResult'
      description: Sink status
    Replication:
      required:
      - executionNodes
      - mode
      - name
      - sinkName
      - sourceName
      type: object
      properties:
        name:
          type: string
        sinkName:
          type: string
        sourceName:
          type: string
        mode:
          $ref: '#/components/schemas/ReplicationMode'
        executionNodes:
          type: array
          items:
            type: string
        status:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/CdcReplicationStatus'
        errorContext:
          type: string
          nullable: true
      description: Cdc replication model.
    SinkType:
      type: string
      description: Type
      enum:
      - ICEBERG
      - GRIDGAIN_8
    CheckResult:
      type: object
      properties:
        name:
          type: string
          description: Violation name
        errorDetails:
          type: string
          description: Error details
          nullable: true
      description: Cdc sink/source check result
    SourceType:
      type: string
      description: Type
      enum:
      - GRIDGAIN
    Problem:
      type: object
      properties:
        title:
          type: string
          description: Short summary of the issue.
        status:
          type: integer
          description: Returned HTTP status code.
          format: int32
        code:
          type: string
          description: Ignite 3 error code.
        type:
          type: string
          description: URI to documentation regarding the issue.
        detail:
          type: string
          description: Extended explanation of the issue.
        node:
          type: string
          description: Name of the node the issue happened on.
        traceId:
          type: string
          description: Unique issue identifier. This identifier can be used to find logs related to the issue.
          format: uuid
        invalidParams:
          type: array
          description: A list of parameters that did not pass validation and the reason for it.
          items:
            $ref: '#/components/schemas/InvalidParam'
      description: Extended description of the problem with the request.
    Sink:
      type: object
      properties:
        type:
          allOf:
          - $ref: '#/components/schemas/SinkType'
          - description: Type
        name:
          type: string
          description: Name
        parameters:
          type: object
          additionalProperties: true
          description: Parameters
        createTableIfNotExists:
          type: boolean
          description: Create table if not exists
          default: true
      description: Sink
    SourceStatus:
      type: object
      properties:
        source:
          allOf:
          - $ref: '#/components/schemas/Source'
          - description: Source
        violations:
          type: array
          description: Checks
          items:
            $ref: '#/components/schemas/CheckResult'
      description: Source status
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    bearerToken:
      type: http
      scheme: bearer
