name: GridGain Capabilities
description: Capabilities catalog for the GridGain in-memory data platform REST/management API.
apiVersion: 9.1.22
baseURL: http://localhost:10300/management/v1
capabilities:
- name: authentication
  operationCount: 3
  operations:
  - method: DELETE
    path: /management/v1/authentication/jwt
    summary: Revoke all JWTs
  - method: DELETE
    path: /management/v1/authentication/jwt/{token}
    summary: Revoke JWT
  - method: POST
    path: /management/v1/authentication/login
    summary: Get JWT
- name: cdcManagement
  operationCount: 18
  operations:
  - method: GET
    path: /management/v1/cdc/replications
    summary: Get the list of CDC replications
  - method: POST
    path: /management/v1/cdc/replications
    summary: Create CDC replication. CDC replication is identified by unique name. CDC replication has a type, parameters
      and a list of tables that should be replicated.
  - method: GET
    path: /management/v1/cdc/replications/{name}
    summary: Get CDC replication by name
  - method: POST
    path: /management/v1/cdc/replications/{name}
    summary: Start CDC replication by name
  - method: DELETE
    path: /management/v1/cdc/replications/{name}
    summary: Delete CDC replication by name
  - method: POST
    path: /management/v1/cdc/replications/{name}/stop
    summary: Stop CDC replication by name
  - method: GET
    path: /management/v1/cdc/sinks
    summary: Get the list of CDC sinks
  - method: POST
    path: /management/v1/cdc/sinks
    summary: Create CDC sink. CDC sink is identified by unique name. CDC sink has a type, parameters and a list of tables
      that should be replicated.
  - method: GET
    path: /management/v1/cdc/sinks/{name}
    summary: Get CDC sink by name
  - method: PUT
    path: /management/v1/cdc/sinks/{name}
    summary: Update CDC sink
  - method: DELETE
    path: /management/v1/cdc/sinks/{name}
    summary: Delete CDC sink by name
  - method: GET
    path: /management/v1/cdc/sinks/{name}/status
    summary: Get CDC sink status by name
  - method: GET
    path: /management/v1/cdc/sources
    summary: Get the list of CDC sources
  - method: POST
    path: /management/v1/cdc/sources
    summary: Create CDC source. CDC source is identified by unique name. CDC source has a type, parameters and a list of tables
      that should be replicated.
  - method: GET
    path: /management/v1/cdc/sources/{name}
    summary: Get CDC source by name
  - method: PUT
    path: /management/v1/cdc/sources/{name}
    summary: Update CDC source
  - method: DELETE
    path: /management/v1/cdc/sources/{name}
    summary: Delete CDC source by name
  - method: GET
    path: /management/v1/cdc/sources/{name}/status
    summary: Get CDC source status by name
