    resources:
    - name: management-v1-configuration-node
      path: /management/v1/configuration/node
      operations:
      - name: getnodeconfiguration
        method: GET
        description: Get node configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatenodeconfiguration
        method: PATCH
        description: Update node configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: management-v1-configuration-node-path
      path: /management/v1/configuration/node/{path}
      operations:
      - name: getnodeconfigurationbypath
        method: GET
        description: Get configuration represented by path
