      name: management-v1-configuration-node
      description: REST surface for management-v1-configuration-node.
      operations:
      - method: GET
        name: getnodeconfiguration
        description: Get node configuration
        call: gridgain-nodeconfiguration.getnodeconfiguration
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatenodeconfiguration
        description: Update node configuration
        call: gridgain-nodeconfiguration.updatenodeconfiguration
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/management/v1/configuration/node/{path}
