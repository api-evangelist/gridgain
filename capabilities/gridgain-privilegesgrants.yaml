    resources:
    - path: /v1/management/v1/rbac/pg
      name: management-v1-rbac-pg
      description: REST surface for management-v1-rbac-pg.
      operations:
      - method: POST
        name: grantprivileges
        description: Grant privileges
        call: gridgain-privilegesgrants.grantprivileges
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
