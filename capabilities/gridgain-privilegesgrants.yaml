      operations:
      - name: grantprivileges
        method: POST
        description: Grant privileges
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: revokeprivileges
        method: DELETE
        description: Revoke privileges
