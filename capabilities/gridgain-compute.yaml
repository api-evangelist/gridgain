naftiko: 1.0.0-alpha2
info:
  label: GridGain REST module — compute
  description: 'GridGain REST module — compute. 4 operations. Lead operation: Retrieve all job states. Self-contained Naftiko
    capability covering one Gridgain business surface.'
  tags:
  - Gridgain
  - compute
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GRIDGAIN_API_KEY: GRIDGAIN_API_KEY
capability:
  consumes:
  - type: http
    namespace: gridgain-compute
    baseUri: http://localhost:10300
    description: GridGain REST module — compute business capability. Self-contained, no shared references.
    resources:
    - name: management-v1-compute-jobs
      path: /management/v1/compute/jobs
      operations:
      - name: jobstates
        method: GET
        description: Retrieve all job states
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: management-v1-compute-jobs-jobId
      path: /management/v1/compute/jobs/{jobId}
      operations:
      - name: jobstate
        method: GET
        description: Retrieve job state
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: jobId
          in: path
          type: string
          description: The unique identifier of the compute job.
          required: true
      - name: canceljob
        method: DELETE
        description: Cancel job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: jobId
          in: path
          type: string
          description: The unique identifier of the compute job.
          required: true
    - name: management-v1-compute-jobs-jobId-priority
      path: /management/v1/compute/jobs/{jobId}/priority
      operations:
      - name: updatepriority
        method: PUT
        description: Update job priority
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: jobId
          in: path
          type: string
          description: The unique identifier of the compute job.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.GRIDGAIN_API_KEY}}'
  exposes:
  - type: rest
    namespace: gridgain-compute-rest
    port: 8080
    description: REST adapter for GridGain REST module — compute. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/management/v1/compute/jobs
      name: management-v1-compute-jobs
      description: REST surface for management-v1-compute-jobs.
      operations:
      - method: GET
        name: jobstates
        description: Retrieve all job states
        call: gridgain-compute.jobstates
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/management/v1/compute/jobs/{jobid}
      name: management-v1-compute-jobs-jobid
      description: REST surface for management-v1-compute-jobs-jobId.
      operations:
      - method: GET
        name: jobstate
        description: Retrieve job state
        call: gridgain-compute.jobstate
        with:
          jobId: rest.jobId
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: canceljob
        description: Cancel job
        call: gridgain-compute.canceljob
        with:
          jobId: rest.jobId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/management/v1/compute/jobs/{jobid}/priority
      name: management-v1-compute-jobs-jobid-priority
      description: REST surface for management-v1-compute-jobs-jobId-priority.
      operations:
      - method: PUT
        name: updatepriority
        description: Update job priority
        call: gridgain-compute.updatepriority
        with:
          jobId: rest.jobId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: gridgain-compute-mcp
    port: 9090
    transport: http
    description: MCP adapter for GridGain REST module — compute. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: retrieve-all-job-states
      description: Retrieve all job states
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: gridgain-compute.jobstates
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-job-state
      description: Retrieve job state
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: gridgain-compute.jobstate
      with:
        jobId: tools.jobId
      outputParameters:
      - type: object
        mapping: $.
    - name: cancel-job
      description: Cancel job
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: gridgain-compute.canceljob
      with:
        jobId: tools.jobId
      outputParameters:
      - type: object
        mapping: $.
    - name: update-job-priority
      description: Update job priority
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: gridgain-compute.updatepriority
      with:
        jobId: tools.jobId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
